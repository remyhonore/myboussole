<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="16" fill="#1E2D4A"/>

  <!-- Title -->
  <text x="400" y="52" font-family="'Plus Jakarta Sans', sans-serif" font-weight="700" font-size="18" fill="#2E9E9E" letter-spacing="3" text-anchor="middle">MÉTHODE 1-1-14</text>
  <line x1="330" y1="64" x2="470" y2="64" stroke="#2E9E9E" stroke-width="1.5" opacity="0.4"/>

  <!-- Step 1 -->
  <circle cx="150" cy="180" r="60" fill="#2E9E9E" opacity="0.12"/>
  <circle cx="150" cy="180" r="48" fill="#2E9E9E" opacity="0.08"/>
  <text x="150" y="170" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="48" fill="#2E9E9E" text-anchor="middle">1</text>
  <text x="150" y="198" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="13" fill="#FAF6F1" text-anchor="middle" opacity="0.7">SOCLE</text>
  <text x="150" y="270" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="15" fill="#FAF6F1" text-anchor="middle">Le domaine qui</text>
  <text x="150" y="290" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="15" fill="#FAF6F1" text-anchor="middle">t'impacte le plus</text>

  <!-- Arrow 1→2 -->
  <line x1="220" y1="180" x2="280" y2="180" stroke="#2E9E9E" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
  <polygon points="280,174 292,180 280,186" fill="#2E9E9E" opacity="0.5"/>

  <!-- Step 2 -->
  <circle cx="400" cy="180" r="60" fill="#D4894A" opacity="0.12"/>
  <circle cx="400" cy="180" r="48" fill="#D4894A" opacity="0.08"/>
  <text x="400" y="170" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="48" fill="#D4894A" text-anchor="middle">1</text>
  <text x="400" y="198" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="13" fill="#FAF6F1" text-anchor="middle" opacity="0.7">LEVIER</text>
  <text x="400" y="270" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="15" fill="#FAF6F1" text-anchor="middle">Une seule action</text>
  <text x="400" y="290" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="15" fill="#FAF6F1" text-anchor="middle">à tester</text>

  <!-- Arrow 2→3 -->
  <line x1="470" y1="180" x2="530" y2="180" stroke="#D4894A" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
  <polygon points="530,174 542,180 530,186" fill="#D4894A" opacity="0.5"/>

  <!-- Step 3 -->
  <circle cx="650" cy="180" r="60" fill="#FAF6F1" opacity="0.06"/>
  <circle cx="650" cy="180" r="48" fill="#FAF6F1" opacity="0.04"/>
  <text x="650" y="170" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="44" fill="#FAF6F1" text-anchor="middle">14</text>
  <text x="650" y="198" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="13" fill="#FAF6F1" text-anchor="middle" opacity="0.7">JOURS</text>
  <text x="650" y="270" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="15" fill="#FAF6F1" text-anchor="middle">Observer avant</text>
  <text x="650" y="290" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="15" fill="#FAF6F1" text-anchor="middle">de changer</text>

  <!-- Bottom message -->
  <rect x="200" y="330" width="400" height="40" rx="20" fill="#2E9E9E" opacity="0.1"/>
  <text x="400" y="356" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="14" fill="#2E9E9E" text-anchor="middle">L'objectif : repérer un pattern, pas un progrès linéaire</text>

  <!-- Signature -->
  <text x="790" y="392" font-family="'Plus Jakarta Sans', sans-serif" font-weight="400" font-size="10" fill="#FAF6F1" text-anchor="end" opacity="0.3">Dr Rémy Honoré — Docteur en pharmacie et nutrithérapeute</text>
</svg>
