<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrowH" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6b7280"/>
    </marker>
    <linearGradient id="grad-tpo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e55a5a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e55a5a" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="grad-tsh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2E9E9E" stop-opacity="0.1"/>
      <stop offset="70%" stop-color="#2E9E9E" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#06172D" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#FAF6F1" rx="12"/>

  <!-- Titre -->
  <text x="400" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#06172D">Évolution silencieuse de Hashimoto</text>
  <text x="400" y="56" text-anchor="middle" font-size="13" fill="#6b7280">Les symptômes précèdent la TSH anormale de plusieurs années</text>

  <!-- Zone graphique -->
  <!-- Axe Y gauche (Anti-TPO) -->
  <line x1="80" y1="80" x2="80" y2="310" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="30" y="100" text-anchor="middle" font-size="10" fill="#e55a5a" font-weight="600">Anti-TPO</text>
  <text x="30" y="113" text-anchor="middle" font-size="10" fill="#e55a5a">(élevés)</text>

  <!-- Axe Y droit (TSH) -->
  <line x1="720" y1="80" x2="720" y2="310" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="755" y="180" text-anchor="middle" font-size="10" fill="#2E9E9E" font-weight="600">TSH</text>

  <!-- Axe X (temps) -->
  <line x1="80" y1="310" x2="725" y2="310" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrowH)"/>
  <text x="400" y="338" text-anchor="middle" font-size="11" fill="#6b7280">Temps (années)</text>

  <!-- Graduations X -->
  <text x="130" y="325" text-anchor="middle" font-size="10" fill="#9ca3af">Infection / stress</text>
  <line x1="130" y1="308" x2="130" y2="315" stroke="#9ca3af" stroke-width="1"/>
  <text x="300" y="325" text-anchor="middle" font-size="10" fill="#9ca3af">3–5 ans</text>
  <line x1="300" y1="308" x2="300" y2="315" stroke="#9ca3af" stroke-width="1"/>
  <text x="490" y="325" text-anchor="middle" font-size="10" fill="#9ca3af">7–10 ans</text>
  <line x1="490" y1="308" x2="490" y2="315" stroke="#9ca3af" stroke-width="1"/>
  <text x="650" y="325" text-anchor="middle" font-size="10" fill="#9ca3af">Décompensation</text>
  <line x1="650" y1="308" x2="650" y2="315" stroke="#9ca3af" stroke-width="1"/>

  <!-- === COURBE ANTI-TPO (monte progressivement) === -->
  <!-- Zone remplie sous la courbe TPO -->
  <path d="M 130,290 C 170,285 200,270 240,245 C 280,218 300,200 340,175 C 380,148 420,135 460,118 C 500,103 550,95 600,88 C 630,84 650,82 680,80 L 680,310 L 130,310 Z" fill="url(#grad-tpo)"/>
  <!-- Courbe TPO -->
  <path d="M 130,290 C 170,285 200,270 240,245 C 280,218 300,200 340,175 C 380,148 420,135 460,118 C 500,103 550,95 600,88 C 630,84 650,82 680,80" fill="none" stroke="#e55a5a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Label courbe TPO -->
  <text x="420" y="126" font-size="11" font-weight="700" fill="#e55a5a">Anti-TPO ↑</text>

  <!-- === COURBE TSH (plate puis remonte) === -->
  <!-- Zone TSH normale (verte) -->
  <rect x="80" y="195" width="570" height="30" rx="0" fill="#2E9E9E" fill-opacity="0.08"/>
  <text x="82" y="208" font-size="9" fill="#2E9E9E" font-weight="600">Zone normale TSH</text>
  <line x1="80" y1="195" x2="720" y2="195" stroke="#2E9E9E" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="80" y1="225" x2="720" y2="225" stroke="#2E9E9E" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Courbe TSH : plate puis monte -->
  <path d="M 130,210 C 200,210 280,212 350,213 C 420,213 480,213 540,214 C 570,214 600,215 630,218 C 650,222 665,240 680,270" fill="none" stroke="#2E9E9E" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Label courbe TSH -->
  <text x="350" y="232" font-size="11" font-weight="700" fill="#2E9E9E">TSH (normale)</text>
  <text x="655" y="265" font-size="11" font-weight="700" fill="#f97316">TSH ↑</text>

  <!-- === PHASES === -->
  <!-- Phase 1 : Silencieuse -->
  <rect x="100" y="80" width="175" height="22" rx="6" fill="#06172D" fill-opacity="0.85"/>
  <text x="188" y="95" text-anchor="middle" font-size="10" font-weight="700" fill="white">Phase silencieuse</text>

  <!-- Phase 2 : Symptômes présents / TSH normale -->
  <rect x="290" y="80" width="215" height="22" rx="6" fill="#f0fafa"/>
  <text x="397" y="95" text-anchor="middle" font-size="10" font-weight="700" fill="#2E9E9E">Symptômes · TSH encore normale</text>

  <!-- Phase 3 : Décompensation -->
  <rect x="525" y="80" width="150" height="22" rx="6" fill="#fff5f5" stroke="#fca5a5" stroke-width="1"/>
  <text x="600" y="95" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b">Décompensation</text>

  <!-- Séparateur phases -->
  <line x1="295" y1="80" x2="295" y2="308" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="525" y1="80" x2="525" y2="308" stroke="#fca5a5" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- === ENCARTS symptômes === -->
  <!-- Encart phase silencieuse -->
  <rect x="88" y="148" width="185" height="80" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1" filter="url(#sh)"/>
  <text x="180" y="168" text-anchor="middle" font-size="10" font-weight="700" fill="#06172D">Bilan standard 🔴 manqué</text>
  <text x="180" y="182" text-anchor="middle" font-size="10" fill="#6b7280">TSH : normale ✓</text>
  <text x="180" y="195" text-anchor="middle" font-size="10" fill="#6b7280">T4L : normale ✓</text>
  <text x="180" y="208" text-anchor="middle" font-size="10" fill="#e55a5a" font-weight="600">Anti-TPO : élevés (ignorés)</text>
  <text x="180" y="221" text-anchor="middle" font-size="10" fill="#e55a5a">Symptômes : absents ou mineurs</text>

  <!-- Encart phase symptômes -->
  <rect x="308" y="140" width="195" height="96" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1" filter="url(#sh)"/>
  <text x="405" y="160" text-anchor="middle" font-size="10" font-weight="700" fill="#06172D">Symptômes présents</text>
  <text x="405" y="174" text-anchor="middle" font-size="10" fill="#374151">😴 Fatigue · brouillard mental</text>
  <text x="405" y="187" text-anchor="middle" font-size="10" fill="#374151">🥶 Frilosité · prise de poids</text>
  <text x="405" y="200" text-anchor="middle" font-size="10" fill="#374151">😞 Dépression · constipation</text>
  <text x="405" y="216" text-anchor="middle" font-size="10" fill="#e55a5a" font-weight="600">TSH encore dans les normes</text>
  <text x="405" y="228" text-anchor="middle" font-size="10" fill="#e55a5a">→ diagnostic manqué sans anti-TPO</text>

  <!-- Encart décompensation -->
  <rect x="538" y="155" width="158" height="72" rx="10" fill="#fff5f5" stroke="#fca5a5" stroke-width="1" filter="url(#sh)"/>
  <text x="617" y="173" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b">TSH sort des normes</text>
  <text x="617" y="187" text-anchor="middle" font-size="10" fill="#7f1d1d">Glande détruite → T4 ↓</text>
  <text x="617" y="200" text-anchor="middle" font-size="10" fill="#7f1d1d">Lévothyroxine prescrite</text>
  <text x="617" y="214" text-anchor="middle" font-size="10" fill="#374151" font-style="italic">Années de retard diagnostique</text>

  <!-- Note de bas de page -->
  <text x="400" y="365" text-anchor="middle" font-size="11" fill="#9ca3af">Sans dosage des anti-TPO, le diagnostic est manqué pendant toute la phase euthyroïdienne</text>
</svg>
