<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E9E9E"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e55a5a"/>
    </marker>
    <marker id="arrow-muted" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#06172D" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#FAF6F1" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#06172D">Conversion des hormones thyroïdiennes</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#6b7280">La TSH ne mesure pas ce qui se passe dans les tissus périphériques</text>

  <!-- === THYROÏDE (gauche) === -->
  <rect x="40" y="120" width="140" height="160" rx="14" fill="#06172D" filter="url(#shadow)"/>
  <text x="110" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="rgba(255,255,255,0.6)" letter-spacing="1">THYROÏDE</text>
  <!-- T4 badge -->
  <rect x="65" y="163" width="90" height="38" rx="8" fill="#2E9E9E"/>
  <text x="110" y="178" text-anchor="middle" font-size="18" font-weight="800" fill="white">T4</text>
  <text x="110" y="193" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">Thyroxine</text>
  <!-- T3 badge (smaller) -->
  <rect x="72" y="212" width="76" height="30" rx="8" fill="rgba(255,255,255,0.1)"/>
  <text x="110" y="226" text-anchor="middle" font-size="13" font-weight="700" fill="rgba(255,255,255,0.5)">+T3 (20%)</text>
  <text x="110" y="239" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.35)">production directe</text>
  <!-- TSH label -->
  <rect x="58" y="255" width="104" height="12" rx="4" fill="rgba(255,255,255,0.05)"/>
  <text x="110" y="265" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.4)">régulée par TSH (hypophyse)</text>

  <!-- === FLÈCHE PRINCIPALE T4 → conversion === -->
  <line x1="185" y1="182" x2="295" y2="182" stroke="#2E9E9E" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrow-teal)"/>
  <text x="238" y="172" text-anchor="middle" font-size="11" fill="#2E9E9E" font-weight="600">80% T4</text>
  <text x="238" y="195" text-anchor="middle" font-size="10" fill="#9ca3af">en circulation</text>

  <!-- === BLOC CONVERSION (centre) === -->
  <rect x="300" y="100" width="200" height="200" rx="14" fill="white" stroke="#e5e7eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="125" text-anchor="middle" font-size="12" font-weight="700" fill="#06172D">DÉIODINASES</text>
  <text x="400" y="141" text-anchor="middle" font-size="10" fill="#9ca3af">foie · rein · cerveau · muscles</text>
  <line x1="320" y1="150" x2="480" y2="150" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Voie T3 active -->
  <rect x="320" y="160" width="160" height="52" rx="8" fill="#f0fafa"/>
  <text x="400" y="178" text-anchor="middle" font-size="11" font-weight="700" fill="#2E9E9E">→ T3 active (60%)</text>
  <text x="400" y="193" text-anchor="middle" font-size="10" fill="#374151">Entre dans les cellules</text>
  <text x="400" y="206" text-anchor="middle" font-size="10" fill="#374151">Active les récepteurs</text>

  <!-- Voie rT3 inactive -->
  <rect x="320" y="222" width="160" height="52" rx="8" fill="#fff5f5"/>
  <text x="400" y="240" text-anchor="middle" font-size="11" font-weight="700" fill="#e55a5a">→ rT3 inactive (40%)</text>
  <text x="400" y="255" text-anchor="middle" font-size="10" fill="#374151">Bloque les récepteurs</text>
  <text x="400" y="268" text-anchor="middle" font-size="10" fill="#374151">Compète avec T3</text>

  <!-- Inhibition label -->
  <rect x="315" y="285" width="170" height="20" rx="6" fill="#fef3c7"/>
  <text x="400" y="299" text-anchor="middle" font-size="10" fill="#92400e" font-weight="600">⚠ Inflammation / cortisol → ↑ rT3</text>

  <!-- === FLÈCHE T3 → cellules === -->
  <line x1="505" y1="186" x2="590" y2="155" stroke="#2E9E9E" stroke-width="2.5" marker-end="url(#arrow-teal)"/>
  <!-- FLÈCHE rT3 → récepteurs bloqués -->
  <line x1="505" y1="248" x2="590" y2="275" stroke="#e55a5a" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- === CELLULE / EFFETS (droite) === -->
  <rect x="595" y="95" width="165" height="100" rx="14" fill="#06172D" filter="url(#shadow)"/>
  <text x="677" y="118" text-anchor="middle" font-size="11" font-weight="700" fill="rgba(255,255,255,0.6)" letter-spacing="1">T3 ACTIVE ✓</text>
  <text x="677" y="136" text-anchor="middle" font-size="10" fill="#2E9E9E">⚡ Énergie (ATP mitochondries)</text>
  <text x="677" y="151" text-anchor="middle" font-size="10" fill="#2E9E9E">🌡 Thermogenèse</text>
  <text x="677" y="166" text-anchor="middle" font-size="10" fill="#2E9E9E">🧠 Neurogenèse / humeur</text>
  <text x="677" y="181" text-anchor="middle" font-size="10" fill="#2E9E9E">🍬 Sensibilité insuline</text>

  <rect x="595" y="245" width="165" height="90" rx="14" fill="#fff5f5" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="677" y="268" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b" letter-spacing="0.5">rT3 BLOQUANTE ✗</text>
  <text x="677" y="284" text-anchor="middle" font-size="10" fill="#7f1d1d">Fatigue chronique</text>
  <text x="677" y="298" text-anchor="middle" font-size="10" fill="#7f1d1d">Brouillard mental</text>
  <text x="677" y="312" text-anchor="middle" font-size="10" fill="#7f1d1d">Frilosité · Prise de poids</text>
  <text x="677" y="326" text-anchor="middle" font-size="10" fill="#991b1b" font-weight="600">TSH peut rester normale</text>

  <!-- Légende bas -->
  <text x="400" y="375" text-anchor="middle" font-size="11" fill="#9ca3af">La TSH mesure la demande hypophysaire — pas la conversion T4→T3 ni le ratio T3/rT3</text>
</svg>
