name: Generate content

on:
  push:
    branches: ["main"]
    paths:
      - "articles/**"
      - "scripts/**"
      - "robots.txt"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate articles index + sitemap
        run: python scripts/generate_content.py

      - name: Normalize article canonicals + og:url
        run: python scripts/normalize_articles_seo.py

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi

          # Scope strict: outputs + article pages, but exclude articles/_template
          git add articles/index.html sitemap.xml articles/*/index.html
          git reset articles/_template/index.html || true

          git commit -m "chore: auto-update sitemap & article SEO [skip ci]"
          git push
